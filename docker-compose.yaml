networks:
  everbit-network:
    driver: bridge

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_HOST=https://everbit.kr/api
      - NEXT_PUBLIC_SECURE_API_HOST=https://everbit.kr/api
      - TZ=Asia/Seoul
    depends_on:
      - server
    networks:
      - everbit-network

  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Seoul
      # E2.1.Micro(1GB) 운영 시 OOM 방지 — JVM 힙 상한. prod 오버라이드에서 env_file: [/etc/everbit/everbit.env] 사용.
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m -XX:MaxMetaspaceSize=96m
    networks:
      - everbit-network