# everbit v2 — bootstrap stub
# SoT: docs/operations/environments.md, docs/security/exposure-policy.md
# Timezone: docs/prompt-pack/server/00_source_map_and_decisions.md §D

spring:
  application:
    name: everbit-api
  datasource:
    url: jdbc:postgresql://127.0.0.1:54322/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

# Base path /api/v2 is on each controller; actuator stays /actuator (external exposure forbidden in prod)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Auth (SoT: docs/operations/environments.md §3.2)
auth:
  jwt-access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-min-32-chars-required}
  jwt-refresh-secret: ${JWT_REFRESH_SECRET:dev-refresh-secret-min-32-chars-required}
  jwt-access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
  jwt-refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
  kakao-client-id: ${KAKAO_CLIENT_ID:}
  kakao-client-secret: ${KAKAO_CLIENT_SECRET:}
  kakao-redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/v2/auth/callback}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
